name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv venv --python 3.11
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check src tests
      - name: Smoke
        run: uv run autocv --help
      - name: Tests
        run: uv run pytest -v
